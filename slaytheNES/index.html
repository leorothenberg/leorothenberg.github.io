<!DOCTYPE html>
<html>
<head>
  <title>My NES Game</title>
  <script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"></script>
</head>
<body>
  <div id="nes" style="margin: auto; width: 512px; height: 480px;"></div>
  <p>
    D-Pad: Arrow keys | Start: Enter | Select: Right Ctrl | A: X | B: Z
  </p>

  <script>
    var browser = new jsnes.Browser({
      container: document.getElementById("nes"),
      onError: function(e) { console.error(e); }
    });

    jsnes.Browser.loadROMFromURL("slaytheNES.nes", function(err, data) {
      if (err) { console.error(err); return; }
      browser.loadROM(data);
    });
  </script>
</body>
</html>
